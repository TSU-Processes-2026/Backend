services:
  api:
    build:
      context: .
      dockerfile: src/Backend/Api/Dockerfile
    ports:
      - "14823:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=lms;Username=lms;Password=lms
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
